# OpenTelemetry Collector configuration
#
# Architecture: LiteLLM → OTel Collector → Prometheus → Grafana
#
# Receivers:
#   - otlp:    receives traces + metrics from LiteLLM's "otel" callback
#   - prometheus: scrapes LiteLLM's /metrics endpoint for built-in
#                Prometheus metrics + custom_callbacks.py histograms
#
# Exporters:
#   - prometheusremotewrite: sends all metrics to Prometheus TSDB
#   - logging: logs traces to stdout (viewable via docker compose logs)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape LiteLLM's /metrics endpoint for Prometheus-format metrics
  # (built-in + custom_callbacks.py TTFT/TPOT/ITL histograms)
  prometheus:
    config:
      scrape_configs:
        - job_name: 'litellm'
          scrape_interval: 15s
          static_configs:
            - targets: ['litellm:4000']
          metrics_path: '/metrics'

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
  memory_limiter:
    limit_mib: 150
    spike_limit_mib: 50
    check_interval: 5s

exporters:
  # Send all metrics to Prometheus via remote write
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    resource_to_telemetry_conversion:
      enabled: true

  # Log traces to stdout for debugging
  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
